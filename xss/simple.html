<!DOCTYPE html>
<html>
<body>
<h2 id="greeting"></h2>

<script>
    // Execute the function on page load
    window.onload = updateGreeting;

    // Execute the function on fragment change
    window.onhashchange = updateGreeting;

    function updateGreeting() {
        // Extract the 'name' parameter from the URL fragment
        const value = new URLSearchParams(location.hash.slice(1)).get('name');

        // Update the h2 element (with id greeting) with the extracted name
        document.getElementById('greeting').innerHTML = "Hello " + value;
    }
</script>
</body>
</html>
